project:
  type: website
  output-dir: docs
  resources:
    - images/brand/
    - CNAME          # custom-domain file for GitHub Pages; copied into docs/ on every render
    - .nojekyll      # tells GitHub Pages to serve files as-is (no Jekyll processing)

website:
  title: "Michael F. Joseph"
  description: >-
    Michael F. Joseph — Assistant Professor of Political Science, UC San Diego.
    Research on war, national security, secrecy, and modern technology.
  site-url: "https://www.michaelfjoseph.com"
  open-graph: true
  twitter-card: true
  favicon: images/brand/favicon.svg
  image: images/profile/headshot.jpg
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - text: "Teaching/Learning"
        menu:
          - href: courses.qmd
            text: Courses
#          - href: advice.qmd
#            text: Advice for Students
      - href: policy.qmd
        text: Policy
      - href: fun-docs.qmd
        text: Fun
    right:
      - href: files/cv/CV.pdf
        text: CV
        target: _blank
      - icon: envelope
        href: "https://mail.google.com/mail/?view=cm&fs=1&to=mfjoseph@ucsd.edu"
        target: _blank
        aria-label: Email
