format:
  html:
    theme:
      - cosmo
      - theme/custom.scss
    toc: false
    page-layout: article
    grid:
      body-width: 900px
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    include-after-body:
      - text: |
          <script>
          document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.navbar-title').forEach(function (el) {
              if (el.textContent.indexOf('.') > -1) {
                el.innerHTML = el.textContent.replace('.', '<span class="brand-dot">.</span>');
              }
            });
          });
          </script>

engine: knitr
